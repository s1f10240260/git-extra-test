  <body>
    <h1>INIAD HUB-1</h1>
    <h2>IoT化された未来のキャンパス</h2>
    <p>
      赤羽台キャンパスにあるINIADは最先端のIoT技術により、様々な設備や機器をネットワークに接続し、それらをキャンパスの状況
      に合わせて協調動作することで、人々に最適な環境を提供しています。このように設備や機器を空間の状況や人の動きに合わせて最適に
      制御するというコンセプトは、坂村 健氏がプロジェクトリーダーを務めるTRONプロジェクトの目指すところであり、赤羽台キャンパス
      にはこの研究成果を取り入れた未来のキャンパスを実現しています。
    </p>
